name: Deploy to cs-document-generator

env:
  PYTHON_VERSION: '3.11'

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v3.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies into .python_packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir --target=".python_packages/lib/site-packages" -r requirements.txt

      - name: Verify packaged dependencies
        run: |
          test -f .python_packages/lib/site-packages/flask_sqlalchemy/__init__.py
          ls -la .python_packages/lib/site-packages | head -n 40

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          include-hidden-files: true
          path: |
            .
            !venv/

  deploy-production:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'cs-document-generator'
      url: ${{ steps.deploy-to-webapp-prod.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: .

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp-prod
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'cs-document-generator'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PROD }}
          package: .
